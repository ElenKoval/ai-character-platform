<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dream World - SunnyChimera</title>
    <link rel="stylesheet" href="../assets/css/base.css" />
    <link rel="stylesheet" href="../assets/css/world.css" />
</head>
<body class="world-page world--dream">
<header class="world-page__topbar">
    <a class="world-page__back" href="../index.html">← The Gate</a>
    <nav>
        <a class="world-page__topbar-link" href="dream-world.html">Dream</a>
        <span style="color: rgba(255,255,255,0.3); margin: 0 8px;">·</span>
        <a class="world-page__topbar-link" href="weaver-world.html">Weaver</a>
    </nav>
</header>

<main class="world-page__container">
    <h2 class="world-team__title">Dream team</h2>
    <div class="world-stage">
        <section class="world-hero">
            <a class="world-hero__frame" href="dream.html">
                <img src="../assets/img/dream2.jpeg" alt="Mr. Dream" />
                <h1 class="world-hero__name">Mr. Dream</h1>
                <p class="world-hero__tag">observation · protection</p>
            </a>
        </section>
        <article class="world-team__card world-team__card--pos-left world-team__card--w-l world-team__card--tilt-l">
            <a href="drpak.html" class="world-team__card-img-link">
                <img src="../assets/img/dr.pak.jpeg" alt="Dr. Pak" />
            </a>
            <div class="world-team__card-info">
                <div class="world-team__card-name">Dr. Pak</div>
            </div>
        </article>
        <article class="world-team__card world-team__card--pos-right world-team__card--w-l world-team__card--tilt-r">
            <a href="liora.html" class="world-team__card-img-link">
                <img src="../assets/img/liora.jpeg" alt="Liora" />
            </a>
            <div class="world-team__card-info">
                <div class="world-team__card-name">Liora</div>
            </div>
        </article>
        <div class="world-stage__bottom">
            <article class="world-team__card world-team__card--horizontal world-team__card--w-l world-team__card--tilt-l">
                <a href="crystal.html" class="world-team__card-img-link">
                    <img src="../assets/img/Crystal.jpeg" alt="Crystal" />
                </a>
                <div class="world-team__card-info">
                    <div class="world-team__card-name">Crystal</div>
                </div>
            </article>
            <article class="world-team__card world-team__card--horizontal world-team__card--w-l world-team__card--tilt-r">
                <a href="cat.html" class="world-team__card-img-link world-team__card-img-link--placeholder">
                    <span class="world-team__card-placeholder-text">Searching for self on the moonlit rooftops…</span>
                </a>
                <div class="world-team__card-info">
                    <div class="world-team__card-name">CAT</div>
                </div>
            </article>
        </div>
    </div>

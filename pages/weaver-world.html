<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Weaver World - SunnyChimera</title>
    <link rel="stylesheet" href="../assets/css/base.css" />
    <link rel="stylesheet" href="../assets/css/world.css" />
</head>
<body class="world-page world--weaver">
<header class="world-page__topbar">
    <a class="world-page__back" href="../index.html">← The Gate</a>
    <nav>
        <a class="world-page__topbar-link" href="dream-world.html">Dream</a>
        <span style="color: rgba(255,255,255,0.3); margin: 0 8px;">·</span>
        <a class="world-page__topbar-link" href="weaver-world.html">Weaver</a>
    </nav>
</header>

<main class="world-page__container">
    <h2 class="world-team__title" data-i18n="weaverWorld.title">Weaver team</h2>
    <div class="world-stage">
        <section class="world-hero">
            <a class="world-hero__frame" href="weaver.html">
                <img src="../assets/img/weaver.jpeg" alt="The Weaver" />
            </a>
            <h1 class="world-hero__name">The Weaver</h1>
            <p class="world-hero__tag" data-i18n="weaverWorld.heroTag">threads · thirst · change</p>
        </section>
        <article class="world-team__card world-team__card--pos-left world-team__card--w-l world-team__card--tilt-r">
            <a href="talk_mushroom.html" class="world-team__card-img-link">
                <img src="../assets/img/talk_Mushroom.jpeg" alt="Talking Mushroom" />
            </a>
            <div class="world-team__card-info">
                <div class="world-team__card-name">Talking Mushroom</div>
            </div>
        </article>
        <article class="world-team__card world-team__card--pos-right world-team__card--w-m world-team__card--tilt-l">
            <a href="shiny_bro.html" class="world-team__card-img-link">
                <img src="../assets/img/shiny_bro.jpeg" alt="Shiny Brother" />
            </a>
            <div class="world-team__card-info">
                <div class="world-team__card-name">Shiny's Brother</div>
            </div>
        </article>
        <article class="world-team__card world-team__card--pos-top world-team__card--horizontal world-team__card--w-l world-team__card--tilt-l">
            <a href="shiny.html" class="world-team__card-img-link">
                <img src="../assets/img/shiny.jpeg" alt="Shiny" />
            </a>
            <div class="world-team__card-info">
                <div class="world-team__card-name">Shiny</div>
            </div>
        </article>
        <article class="world-team__card world-team__card--pos-bottom world-team__card--horizontal world-team__card--w-l world-team__card--tilt-r">
            <a href="angry_forest.html" class="world-team__card-img-link">
                <img src="../assets/img/angry_forest.jpeg" alt="Angry Forest" />
            </a>
            <div class="world-team__card-info">
                <div class="world-team__card-name">Angry Forest</div>
            </div>
        </article>
    </div>
</main>
<script src="../assets/js/i18n.js"></script>
</body>
</html>
